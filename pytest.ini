[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    -p no:xdist
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
markers =
    integration: integration tests (require DB/external services)
    slow: slow-running tests

# 覆盖率配置
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 36

[coverage:html]
directory = htmlcov
