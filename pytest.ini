[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 覆盖率配置
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 60

[coverage:html]
directory = htmlcov
