# Nginx 配置文件 — 性能优化版
# - upstream keepalive 复用后端连接
# - 去除双重 gzip（Nginx 处理，FastAPI 不再压缩）
# - 提升 worker_connections
# - 增加客户端缓存与缓冲调优

worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # 上游连接池 — 复用与 API 的 TCP 连接
    upstream backend_api {
        server zhineng-api:8000;
        keepalive 32;
    }

    # Gzip 压缩（仅 Nginx 侧，避免与 FastAPI GZipMiddleware 双重压缩）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/vnd.api+json;

    # 客户端请求限制
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    # 代理缓冲调优
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    server {
        listen 80;
        server_name localhost;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

        # 静态文件根目录
        root /usr/share/nginx/html;
        index index.html index.htm;

        # API 反向代理 (所有后端路由)
        location ~ ^/(api|audio|annotation|generation|optimization|learning|lifecycle|library|textbook-processing|external)/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding identity;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 健康检查端点
        location /health {
            proxy_pass http://backend_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API 文档
        location /docs {
            proxy_pass http://backend_api/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /openapi.json {
            proxy_pass http://backend_api/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 新版前端 (v2)
        location /v2/ {
            alias /usr/share/nginx/html/frontend-v2/;
            try_files $uri $uri/ /v2/index.html;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # 静态资源长缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # 前端 (主页)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
