# SSL Parameters Configuration
# =============================

# This file contains SSL best practices parameters for Nginx.

# Modern Configuration (TLS 1.2+ only, compatible with most clients)
# ssl_protocols TLSv1.2 TLSv1.3;
# ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

# Intermediate Configuration (TLS 1.0+ for older clients)
# ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
# ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Cipher preferences
ssl_prefer_server_ciphers off;  # Allow client to choose cipher
ssl_ciphers HIGH:!aNULL:!MD5;  # Use high-security ciphers only

# Session cache
ssl_session_cache shared:SSL:50m;  # 50MB cache (~400k sessions)
ssl_session_timeout 1d;  # Session timeout
ssl_session_tickets off;  # Disable session tickets for forward secrecy

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;
# ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;

# Diffie-Hellman parameters
# Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096
# ssl_dhparam /etc/nginx/dhparam.pem;

# Certificate configuration
# ssl_certificate /etc/letsencrypt/live/domain.com/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/domain.com/privkey.pem;
# ssl_trusted_certificate /etc/letsencrypt/live/domain.com/chain.pem;

# Client verification (for internal services only)
# ssl_client_certificate /etc/nginx/client-ca.pem;
# ssl_verify_client on;
# ssl_verify_depth 2;
