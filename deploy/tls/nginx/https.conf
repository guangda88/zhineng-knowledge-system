# Nginx HTTPS Configuration for ZBOX AI Knowledge Base
# ===============================================

# This configuration implements:
# - HTTPS with TLS 1.2+
# - HSTS with preload
# - OCSP Stapling
# - Strong cipher suites
# - Security headers
# - Rate limiting
# - IP blocking

upstream backend {
    server 127.0.0.1:8000;
    # Add more backend servers for load balancing
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;

    # Connection settings
    keepalive 64;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;

# Connection limiting zones
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 443 ssl http2;
    server_name api.zhineng.com www.api.zhineng.com;

    # ========== SSL/TLS Configuration ==========

    # Certificate paths (update these)
    ssl_certificate /etc/letsencrypt/live/api.zhineng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zhineng.com/privkey.pem;

    # SSL protocols (disable weak protocols)
    ssl_protocols TLSv1.2 TLSv1.3;

    # SSL ciphers (Mozilla Intermediate Configuration)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;
    ssl_trusted_certificate /etc/letsencrypt/live/api.zhineng.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman parameters (for forward secrecy)
    # Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ========== Security Headers ==========

    # HSTS (HTTP Strict Transport Security)
    # Preload at https://hstspreload.org/
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # X-Frame-Options (prevent clickjacking)
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options (prevent MIME sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection (browser XSS filter)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()" always;

    # Cross-Origin Policies
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.openai.com https://*.openai.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Remove server version
    server_tokens off;

    # ========== Logging ==========

    # Access log (JSON format for easy parsing)
    access_log /var/log/nginx/api_zhineng_access.log json_combined;

    # Error log
    error_log /var/log/nginx/api_zhineng_error.log warn;

    # ========== Client Limits ==========

    # Maximum body size
    client_max_body_size 50M;

    # Maximum header size
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ========== Proxy Configuration ==========

    # Forward real client IP
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location / {
        # ========== Rate Limiting ==========

        # General rate limit
        limit_req zone=general burst=20 nodelay;

        # ========== Proxy to Backend ==========

        # Proxy headers
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers to pass
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Proto https;

        # WebSockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ========== Caching (Static Assets) ==========

        # Cache static assets
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://backend;
        }

        # ========== Security ==========

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to sensitive files
        location ~* \.(env|git|svn|htaccess|htpasswd|log)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Health check endpoint (no rate limit)
        location /health {
            limit_req zone=general burst=100 nodelay;
            proxy_pass http://backend;
            access_log off;
        }

        # Metrics endpoint (no rate limit, restrict access)
        location /metrics {
            limit_req zone=general burst=50 nodelay;

            # Allow only from monitoring server
            # allow 10.0.0.0/32;
            # deny all;

            proxy_pass http://backend;
        }

        # ========== CORS (if needed) ==========

        # Note: CORS is handled by backend, but we can add
        # additional headers here if needed
    }

    # ========== Specific Endpoints Rate Limiting ==========

    # Login endpoint (5 requests/minute)
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend;
    }

    # Register endpoint (3 requests/minute)
    location = /api/v1/auth/register {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend;
    }

    # Search endpoint (30 requests/minute)
    location = /api/v1/search {
        limit_req zone=search burst=10 nodelay;
        proxy_pass http://backend;
    }

    # ========== Error Pages ==========

    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
}

# ========== HTTP to HTTPS Redirect ==========

server {
    listen 80;
    server_name api.zhineng.com www.api.zhineng.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ========== Maintenance Page ==========

server {
    listen 443 ssl http2;
    server_name api.zhineng.com;

    ssl_certificate /etc/letsencrypt/live/api.zhineng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zhineng.com/privkey.pem;

    root /var/www/maintenance;

    # Uncomment to enable maintenance mode
    # try_files $uri /maintenance.html =503;
}
