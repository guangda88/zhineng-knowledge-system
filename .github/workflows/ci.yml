# ==============================================================================
# 智能知识系统 - CI/CD 工作流
# ==============================================================================
# 功能：
#   - 代码质量检查 (lint, format, security)
#   - 单元测试和集成测试
#   - 测试覆盖率报告
#   - Docker 镜像构建和推送
#   - 自动部署到开发/生产环境
#   - 环境变量和密钥管理
#   - 通知和报告
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'release/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

# 环境变量
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Jobs 定义
# ==============================================================================

jobs:
  # --------------------------------------------------------------------------
  # 代码质量检查
  # --------------------------------------------------------------------------
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort black mypy pylint bandit

      - name: 代码格式检查 (isort)
        run: |
          isort backend/ --profile black --check --diff

      - name: 代码格式检查 (black)
        run: |
          black backend/ --check --diff

      - name: 类型检查 (mypy)
        run: |
          mypy backend/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Flake8 检查
        run: |
          flake8 backend/ \
            --max-line-length=100 \
            --ignore=E203,W503,E501 \
            --exclude=venv,.venv,build,dist

      - name: Pylint 检查
        run: |
          pylint backend/ --errors-only || true
        continue-on-error: true

  # --------------------------------------------------------------------------
  # 安全扫描
  # --------------------------------------------------------------------------
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 运行 Bandit 安全扫描
        run: |
          pip install bandit
          bandit -r backend/ \
            -f json \
            -o security-report.json \
            -ll \
            --exclude backend/tests/ || true

      - name: 上传安全报告
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json
        continue-on-error: true

      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: 上传 Trivy 结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # --------------------------------------------------------------------------
  # 单元测试
  # --------------------------------------------------------------------------
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhineng
          POSTGRES_PASSWORD: zhineng123
          POSTGRES_DB: zhineng_kb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock

      - name: 运行测试
        env:
          DATABASE_URL: postgresql://zhineng:zhineng123@localhost:5432/zhineng_kb_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ \
            -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            htmlcov/
            coverage.xml

      - name: 生成覆盖率徽章
        run: |
          coverage=$(grep -oP 'line-rate="\K[0-9.]+' coverage.xml | head -1)
          percent=$(awk "BEGIN {printf \"%.2f\", ${coverage} * 100}")
          echo "覆盖率: ${percent}%"
        continue-on-error: true

  # --------------------------------------------------------------------------
  # 集成测试
  # --------------------------------------------------------------------------
  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 启动服务
        run: |
          docker-compose up -d postgres redis api
          ./scripts/one_click_deploy.sh health || true

      - name: 等待服务就绪
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'

      - name: 运行集成测试
        run: |
          pytest tests/integration/ -v || true
        continue-on-error: true

      - name: 收集日志
        if: failure()
        run: |
          docker-compose logs > integration-test.log
        continue-on-error: true

      - name: 上传日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: integration-test.log
        continue-on-error: true

      - name: 清理
        if: always()
        run: docker-compose down -v

  # --------------------------------------------------------------------------
  # 构建 Docker 镜像
  # --------------------------------------------------------------------------
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # --------------------------------------------------------------------------
  # 部署到开发环境
  # --------------------------------------------------------------------------
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: http://dev.zhinengkb.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到开发服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /home/ai/zhineng-knowledge-system
            git pull origin develop
            ./scripts/one_click_deploy.sh deploy dev

      - name: 健康检查
        run: |
          sleep 30
          curl -f ${{ secrets.DEV_SERVER_URL }}/health || exit 1

      - name: 通知部署结果
        if: always()
        run: |
          echo "开发环境部署完成"
        # 可添加: Slack、钉钉、企业微信等通知

  # --------------------------------------------------------------------------
  # 部署到生产环境
  # --------------------------------------------------------------------------
  deploy-prod:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.zhinengkb.com

    steps:
      - name: 部署前确认
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: admin,ops-team
          minimum-approvals: 1

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建部署前备份
        run: |
          echo "创建备份..."
        # 可通过 SSH 触发备份脚本

      - name: 部署到生产服务器
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 10
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ai/zhineng-knowledge-system

            # 拉取代码
            git pull origin main

            # 部署
            ./scripts/one_click_deploy.sh deploy prod

            # 健康检查
            ./scripts/one_click_deploy.sh health

      - name: 生产环境健康检查
        run: |
          for i in {1..30}; do
            if curl -sf ${{ secrets.PROD_SERVER_URL }}/health; then
              echo "健康检查通过"
              exit 0
            fi
            echo "等待服务就绪... ($i/30)"
            sleep 10
          done
          echo "健康检查失败"
          exit 1

      - name: 通知部署结果
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "生产环境部署成功"
          else
            echo "生产环境部署失败"
          fi

  # --------------------------------------------------------------------------
  # 定时备份任务
  # --------------------------------------------------------------------------
  scheduled-backup:
    name: 定时备份
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 连接服务器执行备份
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKUP_SERVER_HOST }}
          username: ${{ secrets.BACKUP_SERVER_USER }}
          key: ${{ secrets.BACKUP_SERVER_SSH_KEY }}
          script: |
            cd /home/ai/zhineng-knowledge-system
            ./scripts/backup.sh all

  # --------------------------------------------------------------------------
  # 发布 GitHub Release
  # --------------------------------------------------------------------------
  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成变更日志
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "## 发布版本 ${VERSION}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 变更内容" >> release-notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release-notes.md

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==============================================================================
# 定时任务
# ==============================================================================
# 可在 GitHub 设置中添加以下定时任务：
# - 每日凌晨 2 点执行备份: cron: '0 2 * * *'
# - 每周一执行安全扫描: cron: '0 9 * * 1'
