# ==============================================================================
# 智能知识系统 - CI 工作流
# ==============================================================================
# 功能：
#   - Python 3.12 环境
#   - 依赖安装
#   - flake8 代码检查
#   - pytest 测试运行
#   - 覆盖率报告 (目标60%)
#   - 触发: push, PR
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop, feature/*, fix/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# 环境变量
env:
  PYTHON_VERSION: '3.12'
  COVERAGE_TARGET: 60

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Jobs 定义
# ==============================================================================

jobs:
  # --------------------------------------------------------------------------
  # 代码质量检查 - flake8
  # --------------------------------------------------------------------------
  lint:
    name: 代码质量检查 (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: 运行 flake8 检查
      run: |
        flake8 . \
          --config=.flake8 \
          --format=json \
          --output-file=flake8-report.json \
          || true

    - name: 显示 flake8 结果
      run: |
        if [ -f flake8-report.json ]; then
          cat flake8-report.json | python -m json.tool || true
        fi

    - name: 上传 flake8 报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8-report
        path: flake8-report.json
      continue-on-error: true

    - name: flake8 检查 (严格模式)
      run: |
        flake8 . --config=.flake8 --show-source --statistics

  # --------------------------------------------------------------------------
  # 单元测试
  # --------------------------------------------------------------------------
  test:
    name: 单元测试 (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhineng
          POSTGRES_PASSWORD: zhineng123
          POSTGRES_DB: zhineng_kb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
        - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
        - 6379:6379

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip

    - name: 安装依赖
      run: |
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-mock

    - name: 运行 pytest 测试
      env:
        DATABASE_URL: postgresql://zhineng:zhineng123@localhost:5432/zhineng_kb_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ \
          -v \
          --tb=short \
          --strict-markers \
          -ra \
          --cov=backend \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-report=json \
          --junitxml=test-results.xml \
          --cov-fail-under=${{ env.COVERAGE_TARGET }}

    - name: 生成覆盖率摘要
      run: |
        coverage=$(python -c "import json; data=json.load(open('coverage.json')); print(f\"{data['totals']['percent_covered']:.2f}\")")
        echo "当前覆盖率: ${coverage}%"
        echo "COVERAGE=${coverage}" >> $GITHUB_ENV

    - name: 覆盖率检查
      run: |
        if (( $(echo "${COVERAGE} < ${COVERAGE_TARGET}" | bc -l) )); then
          echo "警告: 覆盖率 ${COVERAGE}% 低于目标 ${COVERAGE_TARGET}%"
          exit 1
        fi
        echo "覆盖率检查通过: ${COVERAGE}% >= ${COVERAGE_TARGET}%"

    - name: 上传测试结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          htmlcov/
          coverage.xml
          coverage.json

    - name: 发布测试结果
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: test-results.xml
        check_name: 测试结果

    - name: 上传覆盖率到 Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

    - name: 覆盖率注释
      uses: madrapps/jacoco-report@v1.6.1
      if: always()
      with:
        paths: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: ${{ env.COVERAGE_TARGET }}
        title: 代码覆盖率报告
      continue-on-error: true

  # --------------------------------------------------------------------------
  # 安全扫描
  # --------------------------------------------------------------------------
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装 Bandit
      run: pip install bandit[toml]

    - name: 运行 Bandit 安全扫描
      run: |
        bandit -r backend/ \
          -f json \
          -o bandit-report.json \
          -ll \
          --exclude backend/tests/ || true

    - name: 上传安全报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json
      continue-on-error: true

    - name: 显示安全问题摘要
      run: |
        if [ -f bandit-report.json ]; then
          python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
              if data.get('results'):
                  print(f'发现 {len(data[\"results\"])} 个安全问题')
                  for issue in data['results'][:5]:
                      print(f'  - {issue[\"issue_text\"]} ({issue[\"filename\"]}:{issue[\"line_number\"]})')
              else:
                  print('未发现安全问题')
          " || true
        fi

  # --------------------------------------------------------------------------
  # CI 状态汇总
  # --------------------------------------------------------------------------
  status-check:
    name: CI 状态检查
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()

    steps:
    - name: 检查所有任务状态
      run: |
        if [ "${{ needs.lint.result }}" != "success" ] || \
           [ "${{ needs.test.result }}" != "success" ]; then
          echo "CI 检查失败"
          echo "  - Lint: ${{ needs.lint.result }}"
          echo "  - Test: ${{ needs.test.result }}"
          echo "  - Security: ${{ needs.security.result }}"
          exit 1
        fi

        echo "CI 检查全部通过"
        echo "  - Lint: ${{ needs.lint.result }}"
        echo "  - Test: ${{ needs.test.result }}"
        echo "  - Security: ${{ needs.security.result }}"

    - name: 创建 CI 状态徽章
      run: |
        echo "CI 状态: 通过"
