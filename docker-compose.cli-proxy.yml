# Docker Compose Override for CLIProxyAPI Integration
# This file extends the base docker-compose.yml to add CLIProxyAPI
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.cli-proxy.yml up -d

version: '3.8'

services:
  # CLIProxyAPI - Unified AI Service Layer
  cliproxyapi:
    image: routerforme/cli-proxy-api:latest
    container_name: lingzhi-cliproxyapi
    ports:
    - 8317:8317      # HTTP API
    - 9090:9090      # Prometheus metrics
    volumes:
      # Mount configuration
    - ./config/cliproxyapi:/app/config:ro
      # Mount logs
    - ./logs/cliproxyapi:/app/logs
    environment:
      # DeepSeek API
    - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Claude API
    - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      # Gemini API
    - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Qwen API
    - QWEN_API_KEY=${QWEN_API_KEY:-}
      # JWT Secret (if using JWT auth)
    - JWT_SECRET=${JWT_SECRET:-lingzhi-default-secret-change-in-production}
      # OAuth Credentials (optional)
    - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
    - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    networks:
    - lingzhi-network
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8317/health]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Update backend to use CLIProxyAPI
  backend:
    environment:
      # CLIProxyAPI endpoint
    - CLIPROXYAPI_BASE_URL=http://cliproxyapi:8317/v1
    - CLIPROXYAPI_API_KEY=lingzhi-api-key-001
      # Enable unified AI service
    - ENABLE_UNIFIED_AI_SERVICE=true
      # Default AI model
    - DEFAULT_AI_MODEL=deepseek-chat
    depends_on:
    - cliproxyapi
    networks:
    - lingzhi-network

networks:
  lingzhi-network:
    name: lingzhi-network
    external: true
