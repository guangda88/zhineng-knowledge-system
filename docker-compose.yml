version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    shm_size: 4gb
    container_name: zhineng-postgres
    command:
    - postgres
    - -c
    - shared_buffers=4GB
    - -c
    - work_mem=128MB
    - -c
    - maintenance_work_mem=1GB
    - -c
    - effective_cache_size=24GB
    - -c
    - max_wal_size=4GB
    - -c
    - min_wal_size=1GB
    - -c
    - checkpoint_completion_target=0.9
    - -c
    - default_statistics_target=200
    - -c
    - max_connections=200
    environment:
      POSTGRES_USER: zhineng
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zhineng_kb
      POSTGRES_INITDB_ARGS: -E UTF8
    ports:
    - 5436:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [CMD-SHELL, pg_isready -U zhineng -d zhineng_kb]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: zhineng-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
    - 6381:6379
    volumes:
    - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, -a, '${REDIS_PASSWORD}', ping]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          memory: 128M

  # BGE-M3 嵌入服务
  embedding:
    build:
      context: ./backend/services/embeddings
      dockerfile: Dockerfile
    container_name: zhineng-embedding
    environment:
      EMBEDDING_MODEL: /model
      EMBEDDING_SERVICE_PORT: 8001
      HF_HOME: /cache
      HF_ENDPOINT: https://hf-mirror.com
      PYTHONUNBUFFERED: 1
    ports:
    - 8001:8001
    volumes:
    - /data/models/bge-small-zh:/model:ro
    - embedding_cache:/cache
    healthcheck:
      test: [CMD, python, -c, import urllib.request; urllib.request.urlopen('http://localhost:8001/health')]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s  # 给模型加载足够的时间
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 2G

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhineng-api
    command: [uvicorn, backend.main:app, --host, 0.0.0.0, --port, '8000', --workers, '2']
    ports:
    - 8000:8000
    environment:
      PYTHONPATH: /app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_URL: postgresql://zhineng:${POSTGRES_PASSWORD}@postgres:5432/zhineng_kb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      EMBEDDING_SERVICE_URL: http://embedding:8001
      JWT_PRIVATE_KEY_FILE: /app/jwt_private.pem
      JWT_PUBLIC_KEY_FILE: /app/jwt_public.pem
    volumes:
    - ./backend:/app/backend
    - ./jwt_private.pem:/app/jwt_private.pem
    - ./jwt_public.pem:/app/jwt_public.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_started
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: zhineng-nginx
    ports:
    - 8008:80
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./frontend:/usr/share/nginx/html:ro
    depends_on:
    - api
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          memory: 64M

  # ========== 阶段5: 监控服务 ==========

  prometheus:
    image: prom/prometheus:latest
    container_name: zhineng-prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-lifecycle
    ports:
    - 9090:9090
    volumes:
    - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: zhineng-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
    - 3000:3000
    volumes:
    - grafana_data:/var/lib/grafana
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
    - prometheus
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # Redis Exporter for monitoring Redis
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: zhineng-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
    - 9121:9121
    depends_on:
    - redis
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          memory: 32M

  # Postgres Exporter for monitoring PostgreSQL
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: zhineng-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://zhineng:${POSTGRES_PASSWORD}@postgres:5432/zhineng_kb?sslmode=disable
    ports:
    - 9187:9187
    depends_on:
    - postgres
    restart: unless-stopped
    networks:
    - zhineng-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          memory: 32M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  embedding_cache:
    driver: local

networks:
  zhineng-network:
    driver: bridge
